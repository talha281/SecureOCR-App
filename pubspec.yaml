name: secure_code_ocr
description: Privacy-first on-device code extraction from images
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^9.0.3

  # State management
  flutter_riverpod: ^2.3.6

  # Typography
  google_fonts: ^5.1.0

  # Secure encrypted local storage (MOD-09)
  flutter_secure_storage: ^8.0.0

  # File system paths (MOD-09 temp file management)
  path_provider: ^2.1.0

  # Path manipulation utilities
  path: ^1.8.3

  # MOD-02: Camera capture (live viewfinder)
  camera: ^0.10.5+9

  # MOD-02: Gallery image picker
  image_picker: ^1.0.4

  # MOD-02: Runtime permissions (camera, storage)
  permission_handler: ^11.0.1

  # MOD-03: Image processing (rotation, contrast, brightness, noise reduction)
  image: ^4.1.3

  # MOD-04: On-device offline OCR engine
  google_mlkit_text_recognition: ^0.11.0

  # MOD-08: Native Share Sheet
  share_plus: ^7.2.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
